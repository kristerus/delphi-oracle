<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Eye shape -->
  <path d="M4 16 C9 9, 23 9, 28 16 C23 23, 9 23, 4 16Z"
        stroke="url(#gold)" stroke-width="1.5" fill="none"/>

  <!-- Iris -->
  <circle cx="16" cy="16" r="5" fill="url(#iris)" stroke="url(#nebula)" stroke-width="1"/>

  <!-- Pupil -->
  <circle cx="16" cy="16" r="2.5" fill="url(#gold-bright)"/>

  <!-- Reflection -->
  <circle cx="17.5" cy="14.5" r="1" fill="white" opacity="0.7"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1228"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c49a2e"/>
      <stop offset="50%" stop-color="#e8c84a"/>
      <stop offset="100%" stop-color="#c49a2e"/>
    </linearGradient>
    <linearGradient id="gold-bright" x1="13.5" y1="13.5" x2="18.5" y2="18.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c49a2e"/>
    </linearGradient>
    <linearGradient id="iris" x1="11" y1="11" x2="21" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a1a4a"/>
      <stop offset="100%" stop-color="#1a0e2e"/>
    </linearGradient>
    <linearGradient id="nebula" x1="11" y1="11" x2="21" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c4bb0"/>
      <stop offset="100%" stop-color="#4a2a80"/>
    </linearGradient>
  </defs>
</svg>
